<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 960" preserveAspectRatio="xMidYMid slice" role="img" aria-label="GOGETTER car advisor">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c0f16"/>
      <stop offset="1" stop-color="#06070b"/>
    </linearGradient>
    <radialGradient id="beam" cx="50%" cy="40%" r="60%">
      <stop offset="0" stop-color="#e9c97a" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6d488"/>
      <stop offset="1" stop-color="#c9a24a"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="960" fill="url(#bg)"/>
  <rect width="1280" height="960" fill="url(#beam)"/>

  <!-- speedometer / gauge motif (brand) -->
  <g transform="translate(640 470)">
    <circle r="300" fill="none" stroke="#1c2230" stroke-width="26"/>
    <circle r="300" fill="none" stroke="url(#gold)" stroke-width="26" stroke-linecap="round"
            stroke-dasharray="1414 1885" transform="rotate(135)"/>
    <!-- ticks -->
    <g stroke="#e9c97a" stroke-width="4" opacity="0.55">
      <line x1="0" y1="-255" x2="0" y2="-230" transform="rotate(-120)"/>
      <line x1="0" y1="-255" x2="0" y2="-230" transform="rotate(-80)"/>
      <line x1="0" y1="-255" x2="0" y2="-230" transform="rotate(-40)"/>
      <line x1="0" y1="-255" x2="0" y2="-230" transform="rotate(0)"/>
      <line x1="0" y1="-255" x2="0" y2="-230" transform="rotate(40)"/>
      <line x1="0" y1="-255" x2="0" y2="-230" transform="rotate(80)"/>
      <line x1="0" y1="-255" x2="0" y2="-230" transform="rotate(120)"/>
    </g>
    <!-- needle -->
    <g transform="rotate(58)">
      <line x1="0" y1="0" x2="0" y2="-240" stroke="url(#gold)" stroke-width="8" stroke-linecap="round"/>
      <circle r="16" fill="#f6d488"/>
    </g>
    <text x="0" y="120" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
          font-size="92" font-weight="600" fill="#f3f4f6">92</text>
    <text x="0" y="170" text-anchor="middle" font-family="Inter, system-ui, sans-serif"
          font-size="26" letter-spacing="6" fill="#9aa3b2">QUALITY SCORE</text>
  </g>

  <radialGradient id="vig2" cx="50%" cy="48%" r="72%">
    <stop offset="0.62" stop-color="#000" stop-opacity="0"/>
    <stop offset="1" stop-color="#000" stop-opacity="0.6"/>
  </radialGradient>
  <rect width="1280" height="960" fill="url(#vig2)"/>
</svg>
