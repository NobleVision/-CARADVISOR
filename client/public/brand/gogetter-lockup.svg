<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 80" fill="none">
  <!-- Horizontal lockup: G-Gauge mark + wordmark. Text uses Georgia/serif so it
       renders consistently when rasterized without webfonts; the in-app lockup
       (Logo component) uses real Fraunces HTML text. -->
  <defs>
    <linearGradient id="ggl-gold" x1="8" y1="8" x2="72" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F6D488"/>
      <stop offset="1" stop-color="#C9A24A"/>
    </linearGradient>
  </defs>

  <g transform="translate(8 8)">
    <path d="M 43 12.95 A 22 22 0 1 0 53.67 28.18"
          stroke="url(#ggl-gold)" stroke-width="5" stroke-linecap="round"/>
    <line x1="53.45" y1="28.25" x2="45.6" y2="29.6"
          stroke="url(#ggl-gold)" stroke-width="5" stroke-linecap="round"/>
    <g stroke="#E9C97A" stroke-opacity="0.55" stroke-width="2" stroke-linecap="round">
      <line x1="16.50" y1="37.64" x2="13.68" y2="38.67"/>
      <line x1="21.39" y1="44.64" x2="19.47" y2="46.94"/>
      <line x1="29.14" y1="48.25" x2="28.61" y2="51.20"/>
      <line x1="37.64" y1="47.51" x2="38.67" y2="50.32"/>
      <line x1="44.64" y1="42.61" x2="46.94" y2="44.53"/>
    </g>
    <line x1="40.25" y1="17.71" x2="41.75" y2="15.11"
          stroke="#E5484D" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="32" y1="32" x2="47.56" y2="21.10"
          stroke="url(#ggl-gold)" stroke-width="5" stroke-linecap="round"/>
    <circle cx="32" cy="32" r="4" fill="url(#ggl-gold)"/>
  </g>

  <text x="92" y="44" font-family="Georgia, 'Times New Roman', serif" font-weight="600"
        font-size="30" letter-spacing="1.5" fill="#F3F4F6">GOGETTER</text>
  <text x="93" y="64" font-family="Georgia, 'Times New Roman', serif" font-weight="400"
        font-size="13" letter-spacing="5" fill="#C9A24A">CAR ADVISOR</text>
</svg>
